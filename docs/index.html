<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Solutions - Alexey Butyrev</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h1 { color: #58a6ff; }
    .stats { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px 25px;
      text-align: center;
    }
    .stat-card .number { font-size: 2em; font-weight: bold; color: #58a6ff; }
    .stat-card .label { color: #8b949e; font-size: 0.9em; }
    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters label { font-weight: 500; }
    select, input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    input { width: 250px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #30363d;
    }
    th { background: #21262d; font-weight: 600; }
    tr:hover { background: #1f2428; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .difficulty-easy { color: #3fb950; }
    .difficulty-medium { color: #d29922; }
    .difficulty-hard { color: #f85149; }
    .topic-tag {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2px 8px;
      margin: 2px;
      font-size: 12px;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      color: #8b949e;
    }
    .footer a { color: #58a6ff; }
    #pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    #pagination button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    #pagination button:hover { background: #30363d; }
    #pagination button.active { background: #58a6ff; color: #0d1117; }
  </style>
</head>
<body>
  <h1>🎯 LeetCode Solutions</h1>
  
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="total-problems">0</div>
      <div class="label">Problems</div>
    </div>
    <div class="stat-card">
      <div class="number" id="easy-count">0</div>
      <div class="label">Easy</div>
    </div>
    <div class="stat-card">
      <div class="number" id="medium-count">0</div>
      <div class="label">Medium</div>
    </div>
    <div class="stat-card">
      <div class="number" id="hard-count">0</div>
      <div class="label">Hard</div>
    </div>
  </div>
  
  <div class="filters">
    <label>Search:</label>
    <input type="text" id="search" placeholder="Filter by problem name...">
    
    <label>Difficulty:</label>
    <select id="difficulty-filter">
      <option value="">All</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
    
    <label>Topic:</label>
    <select id="topic-filter">
      <option value="">All Topics</option>
    </select>
    
    <span id="showing">Showing 0 problems</span>
  </div>
  
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Problem</th>
        <th>Difficulty</th>
        <th>Topics</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="problems-table"></tbody>
  </table>
  
  <div id="pagination"></div>
  
  <div class="footer">
    <p>
      <a href="https://alexeybutyrev.github.io/">🌐 Website</a> • 
      <a href="https://leetcode.com/u/alexey_wish/">🎯 LeetCode</a> • 
      <a href="https://github.com/alexeybutyrev/leetcode-solutions">💻 GitHub</a>
    </p>
    <p>Made with ❤️ by Alexey Butyrev</p>
  </div>

  <script>
    let problems = [];
    let filtered = [];
    let page = 1;
    const perPage = 100;
    
    fetch('problems.json')
      .then(r => r.json())
      .then(data => {
        problems = data;
        filtered = data;
        
        // Get all unique topics
        const topics = new Set();
        problems.forEach(p => p.topics.forEach(t => topics.add(t)));
        const topicSelect = document.getElementById('topic-filter');
        [...topics].sort().forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          topicSelect.appendChild(opt);
        });
        
        // Update stats
        document.getElementById('total-problems').textContent = problems.length;
        document.getElementById('easy-count').textContent = problems.filter(p => p.difficulty === 'Easy').length;
        document.getElementById('medium-count').textContent = problems.filter(p => p.difficulty === 'Medium').length;
        document.getElementById('hard-count').textContent = problems.filter(p => p.difficulty === 'Hard').length;
        
        render();
      });
    
    function filter() {
      const search = document.getElementById('search').value.toLowerCase();
      const difficulty = document.getElementById('difficulty-filter').value;
      const topic = document.getElementById('topic-filter').value;
      
      filtered = problems.filter(p => {
        if (search && !p.title.toLowerCase().includes(search)) return false;
        if (difficulty && p.difficulty !== difficulty) return false;
        if (topic && !p.topics.includes(topic)) return false;
        return true;
      });
      
      page = 1;
      render();
    }
    
    function render() {
      const tbody = document.getElementById('problems-table');
      const start = (page - 1) * perPage;
      const end = start + perPage;
      const pageData = filtered.slice(start, end);
      
      tbody.innerHTML = pageData.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><a href="https://github.com/alexeybutyrev/leetcode-solutions/tree/master/solutions/${p.id}. ${encodeURIComponent(p.title)}">${p.title}</a></td>
          <td class="difficulty-${p.difficulty.toLowerCase()}">${p.difficulty}</td>
          <td>${p.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</td>
          <td><a href="https://leetcode.com/problems/${p.slug}/" target="_blank">🔗</a></td>
        </tr>
      `).join('');
      
      document.getElementById('showing').textContent = `Showing ${filtered.length} problems`;
      
      // Pagination
      const totalPages = Math.ceil(filtered.length / perPage);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';
      
      if (totalPages > 1) {
        for (let i = 1; i <= Math.min(totalPages, 10); i++) {
          const btn = document.createElement('button');
          btn.textContent = i;
          btn.className = i === page ? 'active' : '';
          btn.onclick = () => { page = i; render(); };
          pagination.appendChild(btn);
        }
        if (totalPages > 10) {
          const span = document.createElement('span');
          span.textContent = `... of ${totalPages}`;
          pagination.appendChild(span);
        }
      }
    }
    
    document.getElementById('search').addEventListener('input', filter);
    document.getElementById('difficulty-filter').addEventListener('change', filter);
    document.getElementById('topic-filter').addEventListener('change', filter);
  </script>
</body>
</html>
