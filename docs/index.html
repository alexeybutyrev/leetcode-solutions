<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Solutions - Alexey Butyrev</title>
  <style>
    * { box-sizing: border-box; }
    
    /* Dark mode (default) */
    :root {
      --bg-main: #0d1117;
      --bg-card: #161b22;
      --bg-header: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --link: #58a6ff;
    }
    
    /* Light mode */
    [data-theme="light"] {
      --bg-main: #f6f8fa;
      --bg-card: #ffffff;
      --bg-header: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --link: #0969da;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: var(--bg-main);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 5px;
    }
    h1 { color: var(--accent); margin: 0; }
    .subtitle { color: var(--text-muted); margin-bottom: 20px; }
    
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
    }
    .theme-toggle:hover { background: var(--border); }
    
    .stats { 
      display: flex; 
      gap: 15px; 
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }
    .stat-card .number { font-size: 1.8em; font-weight: bold; color: var(--accent); }
    .stat-card .label { color: var(--text-muted); font-size: 0.85em; }
    .stat-card .progress-container {
      margin-top: 8px;
      height: 4px;
      background: #30363d;
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-card .progress-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .stat-card .progress-easy { background: #3fb950; }
    .stat-card .progress-medium { background: #d29922; }
    .stat-card .progress-hard { background: #f85149; }
    .stat-card .progress-total { background: #58a6ff; }
    
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-group label { font-weight: 500; font-size: 14px; }
    select, input[type="text"] {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      min-width: 120px;
    }
    input[type="text"] { min-width: 180px; }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }
    button {
      background: var(--bg-header);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover { background: var(--border); }
    button.primary { background: #238636; border-color: #238636; color: #fff; }
    button.primary:hover { background: #2ea043; }
    
    .showing { color: var(--text-muted); margin-left: auto; }
    
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    th {
      background: var(--bg-header);
      padding: 12px 15px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: var(--border); }
    th.sortable::after { content: ' ⇅'; opacity: 0.5; }
    th.sort-asc::after { content: ' ↑'; opacity: 1; }
    th.sort-desc::after { content: ' ↓'; opacity: 1; }
    
    td {
      padding: 10px 15px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover { background: var(--bg-header); }
    
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    .difficulty-easy { color: #3fb950; font-weight: 500; }
    .difficulty-medium { color: #d29922; font-weight: 500; }
    .difficulty-hard { color: #f85149; font-weight: 500; }
    
    .topic-tag {
      display: inline-block;
      background: var(--bg-header);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 8px;
      margin: 1px;
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topic-tag:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    
    .lang-tag {
      display: inline-block;
      background: var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: #fff;
    }
    
    .links { display: flex; gap: 8px; }
    .links a {
      font-size: 16px;
      opacity: 0.7;
      cursor: pointer;
    }
    .links a:hover { opacity: 1; }
    
    #pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    #pagination button {
      min-width: 40px;
      padding: 6px 12px;
    }
    #pagination button.active { 
      background: var(--accent); 
      color: #0d1117; 
      border-color: var(--accent);
    }
    
    .footer {
      margin-top: 40px;
      text-align: center;
      color: var(--text-muted);
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--link); }
    .footer .links { justify-content: center; margin-bottom: 10px; }
    
    /* Scroll container */
    .scroll-container {
      height: calc(100vh - 400px);
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
    }
    .scroll-container::-webkit-scrollbar { width: 8px; }
    .scroll-container::-webkit-scrollbar-track { background: var(--bg-card); }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .filters { flex-direction: column; align-items: stretch; }
      .filter-group { width: 100%; }
      select, input[type="text"] { width: 100%; min-width: auto; }
      th, td { padding: 8px 10px; font-size: 13px; }
      
      /* Hide Lang column on mobile */
      th:nth-child(5), td:nth-child(5) { display: none; }
      
      /* Show fewer topic tags on mobile */
      .topic-tag:nth-child(n+3) { display: none; }
    }
    
    @media (max-width: 480px) {
      .header-row { flex-direction: column; gap: 10px; }
      .stats { justify-content: center; }
      .stat-card { min-width: 80px; padding: 10px 15px; }
      .stat-card .number { font-size: 1.4em; }
    }
  </style>
</head>
<body>
  <div class="header-row">
    <div>
      <h1>🎯 LeetCode Solutions</h1>
      <p class="subtitle">My solutions to 2,529 problems on LeetCode</p>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌓</button>
  </div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="total-problems">0</div>
      <div class="label">Showing</div>
      <div class="progress-container"><div class="progress-bar progress-total" id="progress-total"></div></div>
    </div>
    <div class="stat-card">
      <div class="number" id="easy-count">0</div>
      <div class="label">Easy</div>
      <div class="progress-container"><div class="progress-bar progress-easy" id="progress-easy"></div></div>
    </div>
    <div class="stat-card">
      <div class="number" id="medium-count">0</div>
      <div class="label">Medium</div>
      <div class="progress-container"><div class="progress-bar progress-medium" id="progress-medium"></div></div>
    </div>
    <div class="stat-card">
      <div class="number" id="hard-count">0</div>
      <div class="label">Hard</div>
      <div class="progress-container"><div class="progress-bar progress-hard" id="progress-hard"></div></div>
    </div>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <label>🔍</label>
      <input type="text" id="search" placeholder="Search problems...">
    </div>
    
    <div class="filter-group">
      <label>Difficulty:</label>
      <select id="difficulty-filter">
        <option value="">All</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    
    <div class="filter-group">
      <label>Topic:</label>
      <select id="topic-filter">
        <option value="">All Topics</option>
      </select>
    </div>
    
    <div class="filter-group">
      <label>Language:</label>
      <select id="language-filter">
        <option value="">All</option>
      </select>
    </div>
  </div>
  
  <div class="actions">
    <button class="primary" id="random-btn">🎲 Random Problem</button>
    <div class="showing" id="showing">Showing 0 of 0</div>
  </div>
  
  <div class="table-container">
    <div class="scroll-container" id="scroll-container">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="id">#</th>
            <th class="sortable" data-sort="title">Problem</th>
            <th class="sortable" data-sort="difficulty">Difficulty</th>
            <th>Topics</th>
            <th>Lang</th>
            <th>Links</th>
          </tr>
        </thead>
        <tbody id="problems-table"></tbody>
      </table>
    </div>
  </div>
  
  <div id="pagination"></div>
  
  <div class="footer">
    <div class="links">
      <a href="https://alexeybutyrev.github.io/">🌐 Website</a>
      <a href="https://leetcode.com/u/alexey_wish/">🎯 LeetCode</a>
      <a href="https://github.com/alexeybutyrev/leetcode-solutions">💻 GitHub</a>
    </div>
    <p>Made with ❤️ by Alexey Butyrev</p>
  </div>

  <script>
    let problems = [];
    let filtered = [];
    let page = 1;
    const perPage = 50;
    let sortField = 'id';
    let sortDir = 'asc';
    
    // Virtual scrolling
    let visibleStart = 0;
    let visibleEnd = perPage;
    const rowHeight = 45;
    
    fetch('problems.json')
      .then(r => r.json())
      .then(data => {
        problems = data;
        filtered = [...data];
        
        // Get all unique topics
        const topics = new Set();
        problems.forEach(p => p.topics.forEach(t => topics.add(t)));
        const topicSelect = document.getElementById('topic-filter');
        [...topics].sort().forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          topicSelect.appendChild(opt);
        });
        
        // Get all unique languages
        const langs = new Set(problems.map(p => p.language).filter(Boolean));
        const langSelect = document.getElementById('language-filter');
        [...langs].sort().forEach(l => {
          const opt = document.createElement('option');
          opt.value = l;
          opt.textContent = l;
          langSelect.appendChild(opt);
        });
        
        // Update total stats
        updateStats();
        sortProblems();
        render();
      });
    
    function updateStats() {
      const total = filtered.length;
      const easy = filtered.filter(p => p.difficulty === 'Easy').length;
      const medium = filtered.filter(p => p.difficulty === 'Medium').length;
      const hard = filtered.filter(p => p.difficulty === 'Hard').length;
      const totalAll = problems.length;
      
      document.getElementById('easy-count').textContent = easy;
      document.getElementById('medium-count').textContent = medium;
      document.getElementById('hard-count').textContent = hard;
      
      // Update progress bars
      document.getElementById('progress-total').style.width = `${(total / totalAll) * 100}%`;
      document.getElementById('progress-easy').style.width = `${(easy / total) * 100}%`;
      document.getElementById('progress-medium').style.width = `${(medium / total) * 100}%`;
      document.getElementById('progress-hard').style.width = `${(hard / total) * 100}%`;
    }
    
    function filter() {
      const search = document.getElementById('search').value.toLowerCase();
      const difficulty = document.getElementById('difficulty-filter').value;
      const topic = document.getElementById('topic-filter').value;
      const language = document.getElementById('language-filter').value;
      
      filtered = problems.filter(p => {
        if (search && !p.title.toLowerCase().includes(search) && !String(p.id).includes(search)) return false;
        if (difficulty && p.difficulty !== difficulty) return false;
        if (topic && !p.topics.includes(topic)) return false;
        if (language && p.language !== language) return false;
        return true;
      });
      
      page = 1;
      sortProblems();
      updateStats();
      render();
    }
    
    function sortProblems() {
      const diffOrder = { 'Easy': 1, 'Medium': 2, 'Hard': 3 };
      
      filtered.sort((a, b) => {
        let cmp = 0;
        if (sortField === 'id') {
          cmp = a.id - b.id;
        } else if (sortField === 'title') {
          cmp = a.title.localeCompare(b.title);
        } else if (sortField === 'difficulty') {
          cmp = (diffOrder[a.difficulty] || 99) - (diffOrder[b.difficulty] || 99);
        }
        return sortDir === 'asc' ? cmp : -cmp;
      });
    }
    
    function render() {
      const tbody = document.getElementById('problems-table');
      const start = (page - 1) * perPage;
      const end = Math.min(start + perPage, filtered.length);
      const pageData = filtered.slice(start, end);
      
      tbody.innerHTML = pageData.map(p => {
        const ghUrl = `https://github.com/alexeybutyrev/leetcode-solutions/tree/master/solutions/${p.id}.%20${encodeURIComponent(p.title)}`;
        const lcUrl = `https://leetcode.com/problems/${p.slug}/`;
        
        return `
          <tr>
            <td>${p.id}</td>
            <td><a href="${ghUrl}" target="_blank">${escapeHtml(p.title)}</a></td>
            <td class="difficulty-${p.difficulty?.toLowerCase() || ''}">${p.difficulty || 'Unknown'}</td>
            <td>${p.topics.slice(0, 3).map(t => `<span class="topic-tag" onclick="filterByTopic('${escapeHtml(t)}')">${escapeHtml(t)}</span>`).join('')}${p.topics.length > 3 ? `<span class="topic-tag">+${p.topics.length - 3}</span>` : ''}</td>
            <td><span class="lang-tag">${p.language || '?'}</span></td>
            <td class="links">
              <a href="${ghUrl}" target="_blank" title="View solution on GitHub">📝</a>
              <a href="${lcUrl}" target="_blank" title="View on LeetCode">🔗</a>
            </td>
          </tr>
        `;
      }).join('');
      
      document.getElementById('total-problems').textContent = filtered.length;
      document.getElementById('showing').textContent = `Showing ${start + 1}-${end} of ${filtered.length}`;
      
      // Update sort indicators
      document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (th.dataset.sort === sortField) {
          th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
        }
      });
      
      // Pagination
      const totalPages = Math.ceil(filtered.length / perPage);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';
      
      if (totalPages > 1) {
        // First/Prev
        if (page > 1) {
          const firstBtn = document.createElement('button');
          firstBtn.textContent = '«';
          firstBtn.onclick = () => { page = 1; render(); };
          pagination.appendChild(firstBtn);
          
          const prevBtn = document.createElement('button');
          prevBtn.textContent = '‹';
          prevBtn.onclick = () => { page--; render(); };
          pagination.appendChild(prevBtn);
        }
        
        // Page numbers
        const range = 2;
        let startPage = Math.max(1, page - range);
        let endPage = Math.min(totalPages, page + range);
        
        if (startPage > 1) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.padding = '5px';
          pagination.appendChild(document.createTextNode('...'));
        }
        
        for (let i = startPage; i <= endPage; i++) {
          const btn = document.createElement('button');
          btn.textContent = i;
          btn.className = i === page ? 'active' : '';
          btn.onclick = () => { page = i; render(); };
          pagination.appendChild(btn);
        }
        
        if (endPage < totalPages) {
          pagination.appendChild(document.createTextNode('...'));
        }
        
        // Next/Last
        if (page < totalPages) {
          const nextBtn = document.createElement('button');
          nextBtn.textContent = '›';
          nextBtn.onclick = () => { page++; render(); };
          pagination.appendChild(nextBtn);
          
          const lastBtn = document.createElement('button');
          lastBtn.textContent = '»';
          lastBtn.onclick = () => { page = totalPages; render(); };
          pagination.appendChild(lastBtn);
        }
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function randomProblem() {
      if (filtered.length === 0) return;
      const randomIndex = Math.floor(Math.random() * filtered.length);
      const p = filtered[randomIndex];
      const ghUrl = `https://github.com/alexeybutyrev/leetcode-solutions/tree/master/solutions/${p.id}.%20${encodeURIComponent(p.title)}`;
      window.open(ghUrl, '_blank');
    }
    
    // Event listeners
    document.getElementById('search').addEventListener('input', filter);
    document.getElementById('difficulty-filter').addEventListener('change', filter);
    document.getElementById('topic-filter').addEventListener('change', filter);
    document.getElementById('language-filter').addEventListener('change', filter);
    document.getElementById('random-btn').addEventListener('click', randomProblem);
    
    // Sort on header click
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (sortField === field) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortField = field;
          sortDir = 'asc';
        }
        sortProblems();
        render();
      });
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        randomProblem();
      }
    });
    
    // Filter by topic (click on tag)
    function filterByTopic(topic) {
      document.getElementById('topic-filter').value = topic;
      filter();
      // Scroll to top of table
      document.getElementById('scroll-container').scrollTop = 0;
    }
    
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
